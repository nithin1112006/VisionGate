name: faculty_sphere
description: "StaffSync - Automated Face Attendance System with Live Camera"

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter

  # 📷 Live camera preview & frame capture
  camera: ^0.10.5+5

  # 🌐 API communication
  http: ^1.2.0

  # 📶 Wi-Fi BSSID (Geofencing)
  network_info_plus: ^4.1.0

  # 🔌 Check connectivity (WiFi/mobile)
  connectivity_plus: ^5.0.2
  # 🔐 Runtime permissions (Camera, Location)
  permission_handler: ^11.3.0
  flutter_local_notifications: ^17.0.0
  file_picker: ^8.1.2
  # Geolocation for geofencing
  geolocator: ^10.1.0
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

  # 🖼️ Image processing for face recognition
  image: ^4.1.3

  # 📊 Image quality analysis
  image_picker: ^1.0.4

  # 💾 Persistent session storage
  shared_preferences: ^2.2.2

  # 📄 PDF generation and printing
  pdf: ^3.10.8
  printing: ^5.12.0

  cupertino_icons: ^1.0.8
  flutter_map_dragmarker: ^7.0.0
  flutter_background_service: ^5.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  flutter_launcher_icons: ^0.14.1

flutter_icons:
  android: true
  ios: true
  image_path: "assets/images/logo.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/logo.png"
  remove_alpha_ios: true

flutter:
  uses-material-design: true

  assets:
    - assets/images/logo.png
