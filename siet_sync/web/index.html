<!DOCTYPE html>
<html>
<head>
  <script>
    // Anti-Spoofing: Freeze navigator.geolocation to prevent web console coordinate tampering
    (function() {
      if (navigator.geolocation) {
        try {
          const originalGetCurrentPosition = navigator.geolocation.getCurrentPosition;
          const originalWatchPosition = navigator.geolocation.watchPosition;

          // Define secure getCurrentPosition on Geolocation prototype
          Object.defineProperty(Geolocation.prototype, 'getCurrentPosition', {
            value: function(successCallback, errorCallback, options) {
              const secureSuccess = function(position) {
                // Perform checks for basic mocked parameters (if any)
                if (position.mocked || (position.coords && position.coords.accuracy === 0)) {
                  if (errorCallback) {
                    errorCallback({
                      code: 3,
                      message: "Location spoofing detected."
                    });
                    return;
                  }
                }
                successCallback(position);
              };
              originalGetCurrentPosition.call(navigator.geolocation, secureSuccess, errorCallback, options);
            },
            writable: false,
            configurable: false
          });

          // Define secure watchPosition on Geolocation prototype
          Object.defineProperty(Geolocation.prototype, 'watchPosition', {
            value: function(successCallback, errorCallback, options) {
              const secureSuccess = function(position) {
                if (position.mocked || (position.coords && position.coords.accuracy === 0)) {
                  if (errorCallback) {
                    errorCallback({
                      code: 3,
                      message: "Location spoofing detected."
                    });
                    return;
                  }
                }
                successCallback(position);
              };
              return originalWatchPosition.call(navigator.geolocation, secureSuccess, errorCallback, options);
            },
            writable: false,
            configurable: false
          });

          // Log Geolocation security status
          console.log("🛡️ Geolocation security lockdown initialized.");
        } catch (e) {
          console.warn("🛡️ Geolocation security lockdown failed to initialize:", e);
        }
      }
    })();
  </script>

  <meta charset="UTF-8">

  <link rel="manifest" href="manifest.json">

  <link rel="preconnect" href="https://fonts.googleapis.com">

  <!-- Preload main assets -->
  <link rel="preload" href="flutter_bootstrap.js" as="script">
  
  <!-- Inline critical CSS for faster first paint -->
  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #f5f5f5;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    .loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background: linear-gradient(135deg, #673AB7 0%, #9575CD 100%);
    }
    .loading-spinner {
      width: 50px;
      height: 50px;
      border: 4px solid rgba(255,255,255,0.3);
      border-top: 4px solid white;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    .loading-text {
      color: white;
      margin-top: 20px;
      font-size: 16px;
      font-weight: 500;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <!-- Loading indicator shown before Flutter loads -->
  <div class="loading" id="loading">
    <div class="loading-spinner"></div>
    <div class="loading-text">Loading FacultySphere...</div>
  </div>
  
  <script>
    // Hide loading indicator when Flutter is ready
    function hideLoader() {
      const loader = document.getElementById('loading');
      if (loader) {
        loader.style.display = 'none';
        console.log("🛡️ Loader hidden.");
      }
    }
    window.addEventListener('flutter-initialized', hideLoader);
    window.addEventListener('flutter-first-frame', hideLoader);
    
    // Safety fallback: Hide loader after 8 seconds no matter what
    setTimeout(hideLoader, 8000);
  </script>
  
  <script src="flutter_bootstrap.js" defer></script>
</body>
